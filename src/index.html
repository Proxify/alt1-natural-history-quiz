<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Natural History Quiz</title>
  <style>
    body {
      margin: 0;
      padding: 10px;
      font-family: Arial, sans-serif;
      font-size: 13px;
      background: #1e1e1e;
      color: #d4d4d4;
      user-select: none;
    }
    h2 {
      margin: 0 0 8px;
      font-size: 14px;
      color: #4ec9b0;
    }
    #status {
      padding: 6px 8px;
      background: #2d2d2d;
      border-radius: 4px;
      border-left: 3px solid #4ec9b0;
      min-height: 36px;
      word-break: break-word;
    }
    #answer {
      margin-top: 8px;
      padding: 5px 8px;
      background: #1a3a1a;
      border-radius: 4px;
      border-left: 3px solid #4caf50;
      display: none;
    }
    #answer.visible {
      display: block;
    }
    #no-alt1 {
      display: none;
      color: #f48771;
      margin-top: 8px;
      padding: 5px 8px;
      background: #3a1a1a;
      border-radius: 4px;
    }
    #no-alt1.visible {
      display: block;
    }
  </style>
</head>
<body>
  <h2>Natural History Quiz</h2>
  <div id="status">Initializing...</div>
  <div id="answer"></div>
  <div id="no-alt1">
    Alt1 not detected. Open this page inside Alt1 to enable screen reading.
    <br><br>
    To add: <code>Alt1 &gt; Add App by URL &gt; appconfig.json</code>
  </div>
</body>
</html>
